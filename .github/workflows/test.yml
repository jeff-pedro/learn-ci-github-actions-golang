name: Test

on:
  workflow_run:
    workflows: ["Lint"]
    types: [completed]
  
jobs:

  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: root
          POSTGRES_DB: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps: 
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Build
      run: go build -v main.go

    # - name: Upload main artifact
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: main
    #     path: ./

    - name: Start app
      run: ./main
      env:
        DB_HOST: localhost
        DB_USER: root
        DB_PASSWORD: root
        DB_NAME: root
        DB_PORT: 5432

    - name: Test
      run: go build -v main_test.go
