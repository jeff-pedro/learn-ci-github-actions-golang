name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Download main artifact
      uses: actions/download-artifact@v4
      with:
        name: main

    - name: Start app
      run: go run main

    - name: Test
      run: go build -v main_test.go


