name: Construção do Artefato

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login
        uses: docker/login-action@v3
        with:
          usename: jeffersonps
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Constrói e envia imagem
        uses: docke/build-push-action@v3
        with:
          push: true
          tags: jeffersonps/projeto_go:latest
